name: e2e

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    name: e2e # promote this to a required check once stable
    runs-on: ubuntu-latest
    # All Supabase values below are the deterministic, PUBLIC local demo keys —
    # NOT secrets. The e2e job runs entirely against an ephemeral LOCAL Supabase
    # (Postgres + Auth) on the runner; prod is never touched. ubuntu-latest ships
    # Docker, and the supabase CLI is a devDependency (available via pnpm exec).
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      # Local stack has no pooler → both URLs are the direct :54322 connection.
      POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      POSTGRES_URL_NON_POOLING: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      CRON_SECRET: local-ci-cron-secret
      # Center/admin e2e read the real email OTP from the local Supabase mail
      # sink (Mailpit); a LOCAL-ONLY template surfaces the code (see e2e/_mail.ts).
      TEST_CENTER_EMAIL: "center@venemed.test"
      TEST_CENTER_EMAIL_2: "center2@venemed.test"
      TEST_ADMIN_EMAIL: "admin@venemed.test"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Start the LOCAL Supabase stack (blank Postgres + Auth). First start pulls
      # images (slow once). supabase CLI is a devDependency → use pnpm exec.
      - name: Start local Supabase
        run: pnpm exec supabase start

      - run: npx playwright install --with-deps chromium

      # Schema via DRIZZLE (not supabase migrations) + sample data, on LOCAL.
      # Safe to seed here: it's an ephemeral per-job DB, never prod.
      - name: Migrate + seed local DB
        run: pnpm db:setup

      - name: Run Playwright (against local Supabase)
        run: pnpm test:e2e

      - name: Stop local Supabase
        if: always()
        run: pnpm exec supabase stop

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
