name: e2e

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    name: e2e # promote this to a required check once stable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx playwright install --with-deps chromium

      # NOTE: no db:seed/db:migrate here — CI runs against the shared Supabase DB,
      # and seeding deletes/recreates centers (cascading to memberships). The donor
      # spec is written data-independently so no seeding is required.
      - run: pnpm test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          TEST_CENTER_PHONE: ${{ secrets.TEST_CENTER_PHONE }}
          # Second number for the registration test (avoids OTP rate-limit vs login).
          TEST_CENTER_PHONE_2: ${{ secrets.TEST_CENTER_PHONE_2 }}
          # If the secret is unset, this resolves to "" and center.spec skips.
          TEST_OTP_CODE: ${{ secrets.TEST_OTP_CODE }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
